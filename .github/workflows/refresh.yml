name: Refresh summary cache

# Runs the Snowflake queries OFF the request path and commits the compact
# data/cache/summary.json. The app reads that file statically (fast page).
on:
  schedule:
    - cron: "5 * * * *"      # hourly, at :05
  workflow_dispatch: {}        # manual "Run workflow" button

concurrency:
  group: refresh-cache
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - name: Refresh cache from Snowflake
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USERNAME: ${{ secrets.SNOWFLAKE_USERNAME }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_PASSPHRASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: npm run refresh
      - name: Commit updated cache
        run: |
          git config user.name "resihome-refresh-bot"
          git config user.email "bot@resihome.com"
          if ! git diff --quiet -- data/cache/summary.json; then
            git add data/cache/summary.json
            git commit -m "chore: refresh summary cache [skip ci]"
            git push origin main
          else
            echo "No cache changes."
          fi
